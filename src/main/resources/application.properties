spring.application.name=jGameDatabase
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:jgamedatabase
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Active Profiles
spring.profiles.active=local

# IGDB API Credentials (Set via environment variables or profile)
igdb.client-id=${IGDB_CLIENT_ID:placeholder}
igdb.client-secret=${IGDB_CLIENT_SECRET:placeholder}
