spring.application.name=jGameDatabase
spring.h2.console.enabled=true
# H2 File-based Database
spring.datasource.url=jdbc:h2:file:./data/jgamedatabase
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true

# Active Profiles
spring.profiles.active=local

# Thymeleaf
spring.thymeleaf.cache=false

# i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# IGDB API Credentials (Set via environment variables or profile)
igdb.client-id=${IGDB_CLIENT_ID:placeholder}
igdb.client-secret=${IGDB_CLIENT_SECRET:placeholder}

# Hot Reload
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true

# Directorio de backups CSV
app.backup.dir=./backups

# GG.deals API (precios por Steam App ID)
ggdeals.api-key=${GGDEALS_API_KEY:placeholder}
# Region: au, be, br, ca, ch, de, dk, es, eu, fi, fr, gb, ie, it, nl, no, pl, se, us
ggdeals.region=${GGDEALS_REGION:es}