spring.application.name=jGameDatabase
spring.h2.console.enabled=true
# H2 File-based Database
spring.datasource.url=jdbc:h2:file:./data/jgamedatabase;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true

# Active Profiles
spring.profiles.active=local

# IGDB API Credentials (Set via environment variables or profile)
igdb.client-id=${IGDB_CLIENT_ID:placeholder}
igdb.client-secret=${IGDB_CLIENT_SECRET:placeholder}
