# Perfil para distribución portable (generado con jpackage)
# Los datos se guardan en el directorio home del usuario
spring.datasource.url=jdbc:h2:file:${user.home}/.jgamedatabase/data/jgamedatabase

# Sin consola H2 ni devtools en modo portable
spring.h2.console.enabled=false
spring.devtools.restart.enabled=false
spring.thymeleaf.cache=true

# Necesario para la bandeja del sistema (AWT)
spring.main.headless=false