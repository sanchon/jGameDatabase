# H2 database inside Docker volume
spring.datasource.url=jdbc:h2:file:/app/data/jgamedatabase

# H2 console habilitada pero protegida por H2ConsoleAccessFilter (se activa desde /configuration)
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# Reverse proxy: confiar en cabeceras X-Forwarded-* para que las redirecciones usen HTTPS
server.forward-headers-strategy=native