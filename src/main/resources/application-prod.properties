# H2 database inside Docker volume
spring.datasource.url=jdbc:h2:file:/app/data/jgamedatabase

# H2 console habilitada pero protegida por H2ConsoleAccessFilter (se activa desde /configuration)
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# Directorio de backups CSV (montar como volumen en Docker)
app.backup.dir=/app/backups

# Reverse proxy: confiar en cabeceras X-Forwarded-* para que las redirecciones usen HTTPS
server.forward-headers-strategy=native

# Hot reload desactivado en producción
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
spring.thymeleaf.cache=true