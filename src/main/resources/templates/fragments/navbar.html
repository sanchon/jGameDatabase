<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">jGameDatabase</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/games">Mi Colección</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/games/wishlist">Deseados</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/games/new">Añadir Juego</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/configuration"><i class="fas fa-cog me-1"></i> Configuración</a>
                </li>
            </ul>
            <form th:if="${portableMode}" action="/shutdown" method="post" class="d-flex ms-2"
                  onsubmit="return confirm('¿Detener jGameDatabase?')">
                <button type="submit" class="btn btn-outline-danger btn-sm">
                    <i class="fas fa-power-off me-1"></i>Detener
                </button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
