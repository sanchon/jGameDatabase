<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalle del Juego - JGameDatabase</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <!-- SimpleMDE Markdown Editor CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.css">
    <!-- Custom CSS for Markdown Preview -->
    <style>
        .markdown-preview {
            cursor: pointer;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            min-height: 150px;
            padding: 1rem;
        }
        .markdown-preview:hover {
            background-color: #e9ecef;
            border-color: #ced4da;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">JGameDatabase</a>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><span th:text="${game.title}">Título del Juego</span></h2>
            <span class="badge bg-secondary fs-6" th:text="${game.releaseYear}">2023</span>
        </div>

        <form action="#" th:action="@{/games/update/{id}(id=${game.id})}" th:object="${game}" method="post">

            <div class="row">
                <div class="col-md-4 mb-3">
                    <div class="card">
                        <div class="card-header">Información</div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label for="status" class="form-label fw-bold">Estado</label>
                                <select class="form-select" id="status" name="status" th:field="*{status}">
                                    <option value="Backlog">Sin Empezar (Backlog)</option>
                                    <option value="Playing">Jugando</option>
                                    <option value="Completed">Terminado</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Plataforma</label>
                                <p class="form-control-plaintext" th:text="${game.platform != null} ? ${game.platform.name} : '-'">Plataforma</p>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Género</label>
                                <p class="form-control-plaintext" th:text="${game.genre != null} ? ${game.genre.name} : '-'">Género</p>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                        <a href="/games" class="btn btn-outline-secondary">Volver al Listado</a>
                    </div>
                </div>

                <div class="col-md-8 mb-3">
                    <div class="mb-3">
                        <label for="notes" class="form-label fw-bold">Notas Personales</label>
                        <div id="notes-help" class="form-text mb-2">Haz clic en el texto para editar.</div>

                        <!-- Area de Texto (Oculta inicialmente por JS si hay contenido, o reemplazada por Editor) -->
                        <textarea class="form-control" id="notes" name="notes" th:field="*{notes}"></textarea>
                    </div>
                </div>
            </div>

        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SimpleMDE Markdown Editor JS -->
    <script src="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.js"></script>
    <!-- Marked JS for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var textarea = document.getElementById("notes");
            var simplemde = new SimpleMDE({
                element: textarea,
                spellChecker: false,
                status: false
            });

            // Elementos del DOM
            var editorWrapper = simplemde.codemirror.getWrapperElement();
            var parent = editorWrapper.parentNode;

            // Crear div de preview
            var previewDiv = document.createElement("div");
            previewDiv.className = "markdown-preview";
            previewDiv.title = "Haz clic para editar";

            // Renderizar contenido inicial
            var initialContent = simplemde.value();
            if (!initialContent || initialContent.trim() === "") {
                previewDiv.innerHTML = "<em class='text-muted'>Sin notas. Haz clic para añadir...</em>";
            } else {
                previewDiv.innerHTML = marked.parse(initialContent);
            }

            // Insertar preview antes del editor
            parent.insertBefore(previewDiv, editorWrapper);

            // Ocultar editor inicialmente
            editorWrapper.style.display = "none";

            // Evento: Click en Preview -> Mostrar Editor
            previewDiv.addEventListener("click", function() {
                previewDiv.style.display = "none";
                editorWrapper.style.display = "block";
                simplemde.codemirror.refresh();
                simplemde.codemirror.focus();
            });

            // Opcional: Si se borra todo el contenido en el editor, al recargar mostraría "Sin notas"
            // Pero como no estamos implementando "Click fuera para guardar/volver a preview",
            // el flujo es: Preview -> Click -> Editor -> Guardar (Submit).
        });
    </script>
</body>
</html>
