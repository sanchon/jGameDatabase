<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Juego - jGameDatabase</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cover-preview {
            max-height: 200px;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">jGameDatabase</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/games">Mi Colección</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/games/wishlist">Deseados</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/games/new">Añadir Juego</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/configuration"><i class="fas fa-cog me-1"></i> Configuración</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h2 class="h4 mb-0"><i class="fas fa-edit me-2"></i>Editar Juego</h2>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/games/update/{id}(id=${game.id})}" th:object="${game}" method="post">
                            <input type="hidden" th:field="*{wishlist}">

                            <div class="text-center mb-4">
                                <h3 th:text="${game.title}">Game Title</h3>
                                <img th:if="${game.coverUrl != null}" th:src="${game.coverUrl}" class="cover-preview mt-2 rounded shadow-sm">
                            </div>

                            <div class="mb-3" th:if="${!game.wishlist}">
                                <label for="status" class="form-label">Estado</label>
                                <select class="form-select" id="status" th:field="*{status}">
                                    <option value="Sin empezar">Sin empezar</option>
                                    <option value="Jugando">Jugando</option>
                                    <option value="Terminado">Terminado</option>
                                    <option value="Abandonado">Abandonado</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="rating" class="form-label">Valoración (0-100)</label>
                                <input type="number" class="form-control" id="rating" th:field="*{rating}" step="0.1" min="0" max="100">
                            </div>

                            <div class="mb-3">
                                <label for="steamAppId" class="form-label">Steam App ID</label>
                                <input type="number" class="form-control" id="steamAppId" th:field="*{steamAppId}" min="1" placeholder="Opcional (precios GG.deals)">
                            </div>

                            <div class="mb-4">
                                <label for="notes" class="form-label">Notas</label>
                                <textarea class="form-control" id="notes" th:field="*{notes}" rows="5"></textarea>
                                <div class="form-text">Formato Markdown. La vista renderizada y un editor más amplio están en la <a th:href="@{/games/detail/{id}(id=${game.id})}">página de detalle</a>.</div>
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="${game.wishlist ? '/games/wishlist' : '/games'}" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-1"></i> Guardar Cambios
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
