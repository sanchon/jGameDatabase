<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Añadir Juego - JGameDatabase</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">JGameDatabase</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Completar Datos del Juego</h2>

        <form action="#" th:action="@{/games/create}" th:object="${game}" method="post">
            <input type="hidden" th:field="*{igdbId}" />
            <input type="hidden" th:field="*{coverUrl}" />

            <div class="row">
                <div class="col-md-4 text-center mb-4">
                    <img th:if="${game.coverUrl != null && !game.coverUrl.isEmpty()}"
                         th:src="${game.coverUrl}"
                         alt="Cover"
                         class="img-fluid rounded shadow"
                         style="max-height: 400px;">
                    <div th:unless="${game.coverUrl != null && !game.coverUrl.isEmpty()}"
                         class="bg-secondary rounded d-flex align-items-center justify-content-center text-white mx-auto"
                         style="width: 200px; height: 300px;">
                        <span class="fs-4">Sin Carátula</span>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="mb-3">
                        <label for="title" class="form-label">Título</label>
                        <input type="text" class="form-control" id="title" th:field="*{title}" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="releaseYear" class="form-label">Año de Lanzamiento</label>
                            <input type="number" class="form-control" id="releaseYear" th:field="*{releaseYear}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="rating" class="form-label">Mi Puntuación (0-10)</label>
                            <input type="number" step="0.1" min="0" max="10" class="form-control" id="rating" th:field="*{rating}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="platform" class="form-label">Plataforma *</label>
                            <select class="form-select" id="platform" th:field="*{platform}" required>
                                <option value="">Selecciona una plataforma...</option>
                                <option th:each="p : ${platforms}" th:value="${p.id}" th:text="${p.name}"></option>
                            </select>
                            <div class="form-text">¿No encuentras la plataforma? <a href="#">Añadir nueva</a></div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="genre" class="form-label">Género *</label>
                            <select class="form-select" id="genre" th:field="*{genre}" required>
                                <option value="">Selecciona un género...</option>
                                <option th:each="g : ${genres}" th:value="${g.id}" th:text="${g.name}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="status" class="form-label">Estado</label>
                        <select class="form-select" id="status" th:field="*{status}">
                            <option value="Backlog">Sin Empezar (Backlog)</option>
                            <option value="Playing">Jugando</option>
                            <option value="Completed">Terminado</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="/games/new" class="btn btn-outline-secondary me-md-2">Volver a buscar</a>
                        <button type="submit" class="btn btn-primary">Guardar Juego</button>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
