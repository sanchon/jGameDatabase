<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{list.title}">My Collection - jGameDatabase</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .game-card {
            transition: transform 0.2s;
            height: 100%;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .cover-img {
            height: 200px;
            object-fit: cover;
        }
        .table-responsive {
            border-radius: 0.5rem;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        .filter-bar {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 2rem;
            padding: 0.4rem 0.75rem;
        }
        .filter-bar-label {
            color: #6c757d;
            font-size: 0.8rem;
            padding-right: 0.25rem;
        }
        .filter-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 2rem;
            padding: 0.2rem 0.7rem;
            font-size: 0.8rem;
            color: #495057;
            transition: border-color 0.15s, background 0.15s, color 0.15s;
        }
        .filter-pill i {
            font-size: 0.7rem;
            opacity: 0.55;
        }
        .filter-pill select {
            border: none;
            background: transparent;
            font-size: 0.8rem;
            padding: 0;
            cursor: pointer;
            outline: none;
            color: inherit;
            max-width: 130px;
        }
        .filter-pill.active {
            background: #e7f0ff;
            border-color: #0d6efd;
            color: #0d6efd;
        }
        .filter-pill.active i {
            opacity: 1;
        }
        .filter-pill.active select {
            font-weight: 600;
            color: #0d6efd;
        }
        .filter-clear {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.6rem;
            height: 1.6rem;
            border-radius: 50%;
            background: #dee2e6;
            color: #495057;
            text-decoration: none;
            font-size: 0.75rem;
            transition: background 0.15s, color 0.15s;
        }
        .filter-clear:hover {
            background: #dc3545;
            color: #fff;
        }
    </style>
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container-fluid px-4">

        <!-- Error Message -->
        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="#{list.error}">Error processing the request.</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
            <h2 class="mb-0"><i class="fas fa-gamepad me-2"></i><span th:text="#{list.heading}">My Collection</span></h2>
            <div class="d-flex flex-wrap align-items-center gap-2">
                <a href="/games/export" class="btn btn-outline-secondary btn-sm">
                    <i class="fas fa-file-export"></i> <span th:text="#{list.btn.export}">Export</span>
                </a>
                <form action="/games/import" method="post" enctype="multipart/form-data" class="d-flex align-items-center gap-2">
                    <input type="file" name="file" class="form-control form-control-sm" accept=".csv" required>
                    <button type="submit" class="btn btn-outline-secondary btn-sm" th:text="#{list.btn.import}">Import</button>
                </form>
                <a href="/games/new" class="btn btn-primary btn-sm">
                    <i class="fas fa-plus"></i> <span th:text="#{list.btn.newGame}">New Game</span>
                </a>
            </div>
        </div>

        <!-- Filters & Sorting -->
        <form id="gamesFilterForm" action="/games" method="get">
            <input type="hidden" name="sortBy" th:value="${sortBy}">
            <input type="hidden" name="sortDir" th:value="${sortDir}">
            <div class="filter-bar d-flex flex-wrap gap-2 align-items-center mb-3">
                <span class="filter-bar-label"><i class="fas fa-filter"></i></span>

                <div class="filter-pill" th:classappend="${selectedStatus != null and !selectedStatus.isEmpty()} ? 'active'">
                    <i class="fas fa-circle-half-stroke"></i>
                    <select name="status" onchange="this.form.submit()">
                        <option value="" th:text="#{list.filter.status.all}">All statuses</option>
                        <option value="Not started" th:selected="${selectedStatus == 'Not started'}" th:text="#{status.notStarted}">Not started</option>
                        <option value="Playing"     th:selected="${selectedStatus == 'Playing'}"     th:text="#{status.playing}">Playing</option>
                        <option value="Completed"   th:selected="${selectedStatus == 'Completed'}"   th:text="#{status.completed}">Completed</option>
                        <option value="Abandoned"   th:selected="${selectedStatus == 'Abandoned'}"   th:text="#{status.abandoned}">Abandoned</option>
                    </select>
                </div>

                <div class="filter-pill" th:classappend="${selectedGenre != null} ? 'active'">
                    <i class="fas fa-tag"></i>
                    <select name="genreId" onchange="this.form.submit()">
                        <option value="" th:text="#{list.filter.genre.all}">All genres</option>
                        <option th:each="genre : ${genres}"
                                th:value="${genre.id}"
                                th:text="${genre.name}"
                                th:selected="${selectedGenre == genre.id}">
                        </option>
                    </select>
                </div>

                <div class="filter-pill" th:classappend="${selectedPlatform != null} ? 'active'">
                    <i class="fas fa-tv"></i>
                    <select name="platformId" onchange="this.form.submit()">
                        <option value="" th:text="#{list.filter.platform.all}">All platforms</option>
                        <option th:each="platform : ${platforms}"
                                th:value="${platform.id}"
                                th:text="${platform.name}"
                                th:selected="${selectedPlatform == platform.id}">
                        </option>
                    </select>
                </div>

                <div class="filter-pill" th:classappend="${selectedStore != null} ? 'active'">
                    <i class="fas fa-store"></i>
                    <select name="storeId" onchange="this.form.submit()">
                        <option value="" th:text="#{list.filter.store.all}">All formats</option>
                        <option th:each="store : ${stores}"
                                th:value="${store.id}"
                                th:text="${store.name}"
                                th:selected="${selectedStore == store.id}">
                        </option>
                    </select>
                </div>

                <a th:if="${(selectedStatus != null and !selectedStatus.isEmpty()) or selectedGenre != null or selectedPlatform != null or selectedStore != null}"
                   href="/games"
                   class="filter-clear"
                   th:title="#{list.filter.clear}">
                    <i class="fas fa-xmark"></i>
                </a>
            </div>
        </form>

        <!-- Games Table -->
        <div class="table-responsive bg-white">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th style="width: 50px;">#</th>
                        <th style="width: 80px;" th:text="#{list.col.cover}">Cover</th>
                        <th>
                            <a th:href="@{/games(sortBy='title', sortDir=${sortBy == 'title' ? reverseSortDir : 'asc'}, status=${selectedStatus}, genreId=${selectedGenre}, platformId=${selectedPlatform}, storeId=${selectedStore})}"
                               class="text-decoration-none text-dark d-flex align-items-center">
                                <span th:text="#{list.col.title}">Title</span>
                                <i th:if="${sortBy == 'title'}"
                                   th:class="${sortDir == 'asc' ? 'fas fa-sort-up ms-1' : 'fas fa-sort-down ms-1'}"></i>
                            </a>
                        </th>
                        <th th:text="#{list.col.platform}">Platform</th>
                        <th th:text="#{list.col.genre}">Genre</th>
                        <th>
                            <a th:href="@{/games(sortBy='releaseYear', sortDir=${sortBy == 'releaseYear' ? reverseSortDir : 'desc'}, status=${selectedStatus}, genreId=${selectedGenre}, platformId=${selectedPlatform}, storeId=${selectedStore})}"
                               class="text-decoration-none text-dark d-flex align-items-center">
                                <span th:text="#{list.col.year}">Year</span>
                                <i th:if="${sortBy == 'releaseYear'}"
                                   th:class="${sortDir == 'asc' ? 'fas fa-sort-up ms-1' : 'fas fa-sort-down ms-1'}"></i>
                            </a>
                        </th>
                        <th th:text="#{list.col.status}">Status</th>
                        <th th:text="#{list.col.store}">Format</th>
                        <th>
                            <a th:href="@{/games(sortBy='rating', sortDir=${sortBy == 'rating' ? reverseSortDir : 'desc'}, status=${selectedStatus}, genreId=${selectedGenre}, platformId=${selectedPlatform}, storeId=${selectedStore})}"
                               class="text-decoration-none text-dark d-flex align-items-center">
                                <span th:text="#{list.col.score}">Score</span>
                                <i th:if="${sortBy == 'rating'}"
                                   th:class="${sortDir == 'asc' ? 'fas fa-sort-up ms-1' : 'fas fa-sort-down ms-1'}"></i>
                            </a>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="game : ${games}">
                        <td th:text="${game.id}">1</td>
                        <td>
                            <img th:if="${game.coverUrl != null}" th:src="${game.coverUrl}"
                                 alt="Cover" class="rounded" style="width: 40px; height: 55px; object-fit: cover;">
                            <div th:if="${game.coverUrl == null}" class="bg-light rounded d-flex align-items-center justify-content-center"
                                 style="width: 40px; height: 55px;">
                                <i class="fas fa-image text-muted"></i>
                            </div>
                        </td>
                        <td>
                            <a th:href="@{/games/detail/{id}(id=${game.id})}" class="fw-bold text-decoration-underline" th:text="${game.title}">Super Mario World</a>
                        </td>
                        <td>
                            <span class="badge bg-secondary" th:if="${game.platform != null}" th:text="${game.platform.name}">SNES</span>
                        </td>
                        <td>
                            <span class="badge bg-info text-dark" th:if="${game.genre != null}" th:text="${game.genre.name}">Platformer</span>
                        </td>
                        <td th:text="${game.releaseYear}">1990</td>
                        <td>
                            <span class="badge d-inline-flex align-items-center gap-1"
                                  th:classappend="${game.status == 'Completed'  ? 'bg-success'  :
                                                  (game.status == 'Playing'    ? 'bg-primary'  :
                                                  (game.status == 'Abandoned' ? 'bg-danger'   : 'bg-secondary'))}">
                                <i class="fas fa-xs"
                                   th:classappend="${game.status == 'Completed'  ? 'fa-check' :
                                                   (game.status == 'Playing'    ? 'fa-play'  :
                                                   (game.status == 'Abandoned' ? 'fa-ban'   : 'fa-circle'))}"></i>
                                <span th:text="${game.status == 'Not started' ? #messages.msg('status.notStarted') :
                                               (game.status == 'Playing'      ? #messages.msg('status.playing')    :
                                               (game.status == 'Completed'    ? #messages.msg('status.completed')  :
                                               (game.status == 'Abandoned'    ? #messages.msg('status.abandoned')  : game.status)))}"></span>
                            </span>
                        </td>
                        <td>
                            <span th:if="${game.store != null}"
                                  th:title="${game.store.name}"
                                  class="text-secondary">
                                <i class="fas fa-compact-disc"
                                   th:if="${game.store.name == 'Formato físico'}"></i>
                                <i class="fab fa-steam"
                                   th:if="${game.store.name == 'Steam'}"></i>
                                <i class="fas fa-store"
                                   th:if="${game.store.name != 'Formato físico' and game.store.name != 'Steam'}"></i>
                                <span class="d-none d-xl-inline small ms-1" th:text="${game.store.name}">Steam</span>
                            </span>
                        </td>
                        <td>
                            <div th:if="${game.rating != null}" class="d-flex align-items-center">
                                <i class="fas fa-star text-warning me-1"></i>
                                <span th:text="${game.rating}">9.5</span>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(games)}">
                        <td colspan="9" class="text-center py-4 text-muted">
                            <i class="fas fa-ghost fa-2x mb-2"></i>
                            <p class="mb-0" th:text="#{list.empty}">No games found with the current filters.</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-3 text-muted small text-end">
            <span th:text="#{list.showing(${#lists.size(games)})}">Showing 0 games</span>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        sessionStorage.setItem('collectionFilters', window.location.search);
    </script>
</body>
</html>
