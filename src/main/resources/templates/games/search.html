<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Buscar Juego - JGameDatabase</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">JGameDatabase</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Añadir Nuevo Juego</h2>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Buscar en IGDB</h5>
                        <form action="/games/search" method="get" class="d-flex gap-2">
                            <input type="text" name="query" class="form-control" placeholder="Escribe el nombre del juego..." required th:value="${query}">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-search"></i> Buscar
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${results != null}" class="row">
            <div class="col-12">
                <h4 class="mb-3">Resultados de la búsqueda</h4>
                <div class="list-group">
                    <a th:each="game : ${results}"
                       th:href="@{/games/create(igdbId=${game.id}, title=${game.name}, year=${game.firstReleaseDate}, cover=${game.cover != null ? game.cover.url : ''})}"
                       class="list-group-item list-group-item-action d-flex align-items-center gap-3">

                        <img th:if="${game.cover != null}" th:src="${game.cover.url}" alt="Cover" width="60" height="80" class="rounded">
                        <div th:unless="${game.cover != null}" class="bg-secondary rounded d-flex align-items-center justify-content-center text-white" style="width: 60px; height: 80px;">
                            <i class="bi bi-image"></i>
                        </div>

                        <div class="flex-grow-1">
                            <h5 class="mb-1" th:text="${game.name}">Game Title</h5>
                            <p class="mb-0 text-muted">
                                <span th:text="${#dates.format(new java.util.Date(game.firstReleaseDate * 1000), 'yyyy')}">2023</span>
                                <span th:if="${game.platforms != null}" class="ms-2 badge bg-light text-dark border">
                                    <span th:each="plat, iter : ${game.platforms}" th:text="${plat.name} + (${!iter.last} ? ', ' : '')">PS5</span>
                                </span>
                            </p>
                        </div>
                        <button class="btn btn-outline-success btn-sm">Seleccionar</button>
                    </a>
                </div>

                <div th:if="${#lists.isEmpty(results)}" class="alert alert-warning mt-3">
                    No se encontraron juegos con ese nombre.
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
