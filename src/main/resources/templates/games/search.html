<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{search.title}">Search Game - jGameDatabase</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cover-img {
            width: 80px;
            height: 110px;
            object-fit: cover;
            border-radius: 5px;
        }
        .card-header-custom {
            background-color: #667eea;
            color: white;
            border-bottom: none;
        }
        .search-results {
            margin-top: 2rem;
        }
    </style>
</head>
<body class="bg-light">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-header card-header-custom p-4">
                        <h2 class="mb-0"><i class="fas fa-search me-2"></i><span th:text="#{search.heading}">Search for a new game</span></h2>
                        <p class="mb-0 mt-2 opacity-75" th:text="#{search.subheading}">Find games in the IGDB database to add to your collection or wishlist.</p>
                    </div>
                    <div class="card-body p-4">
                        <form action="/games/search" method="get" class="d-flex gap-2">
                            <input type="text" name="query" class="form-control form-control-lg"
                                   th:placeholder="#{search.placeholder}" th:value="${query}" required>
                            <input type="hidden" name="wishlist" th:value="${wishlist}">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-search"></i>
                            </button>
                        </form>

                        <div class="mt-3 form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="wishlistCheck"
                                   onchange="updateWishlistParam(this.checked)"
                                   th:checked="${wishlist}">
                            <label class="form-check-label" for="wishlistCheck" th:text="#{search.wishlistToggle}">Search for wishlist</label>
                        </div>
                    </div>
                </div>

                <!-- Results -->
                <div th:if="${results != null}" class="search-results">
                    <h4 class="mb-3 text-secondary" th:text="#{search.results.heading(${query})}">Results for "Query"</h4>

                    <div class="list-group shadow-sm">
                        <div th:each="game : ${results}" class="list-group-item list-group-item-action d-flex gap-3 py-3" aria-current="true">
                            <img th:if="${game.coverUrl != null}" th:src="${game.coverUrl}" alt="Cover" class="cover-img flex-shrink-0">
                            <div th:if="${game.coverUrl == null}" class="cover-img flex-shrink-0 bg-light d-flex align-items-center justify-content-center text-muted">
                                <i class="fas fa-image fa-2x"></i>
                            </div>

                            <div class="d-flex gap-2 w-100 justify-content-between">
                                <div>
                                    <h5 class="mb-1" th:text="${game.name}">Game Title</h5>
                                    <p class="mb-1 text-muted small">
                                        <i class="far fa-calendar-alt me-1"></i> <span th:text="${game.firstReleaseDate}">2023</span>
                                    </p>
                                    <div class="mb-2">
                                        <span class="badge bg-info text-dark me-1" th:if="${game.genres != null && !game.genres.isEmpty()}"
                                              th:text="${game.genres[0].name}">Action</span>
                                        <span class="badge bg-warning text-dark" th:if="${game.totalRating != null}">
                                            <i class="fas fa-star me-1"></i><span th:text="${#numbers.formatDecimal(game.totalRating, 1, 1)}">8.5</span>
                                        </span>
                                    </div>
                                    <p class="mb-0 small text-truncate" style="max-width: 400px;" th:text="${game.summary}">Summary...</p>
                                </div>
                                <div class="align-self-center">
                                    <a th:href="@{/games/create(
                                        igdbId=${game.id},
                                        title=${game.name},
                                        year=${game.firstReleaseDate != null && game.firstReleaseDate.length() >= 4 ? #strings.substring(game.firstReleaseDate, 0, 4) : null},
                                        cover=${game.coverUrl},
                                        slug=${game.slug},
                                        rating=${game.totalRating},
                                        genre=${(game.genres != null && !game.genres.isEmpty()) ? game.genres[0].name : null},
                                        platforms=${game.platformNamesJoined},
                                        wishlist=${wishlist}
                                       )}"
                                       class="btn btn-outline-success btn-sm text-nowrap">
                                        <i class="fas fa-plus"></i>
                                        <span th:text="${wishlist ? #messages.msg('search.btn.addWishlist') : #messages.msg('search.btn.addCollection')}">Add</span>
                                    </a>
                                </div>
                            </div>
                        </div>

                        <div th:if="${#lists.isEmpty(results)}" class="text-center py-5">
                            <i class="fas fa-ghost fa-3x text-muted mb-3"></i>
                            <p class="text-muted" th:text="#{search.empty}">No results found.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateWishlistParam(checked) {
            const urlParams = new URLSearchParams(window.location.search);
            urlParams.set('wishlist', checked);

            // Update the hidden input in the form
            const hiddenInput = document.querySelector('input[name="wishlist"]');
            if (hiddenInput) {
                hiddenInput.value = checked;
            }

            // If we are just on the form page (not searching yet), reload with param
            if (window.location.pathname.endsWith('/new')) {
                window.location.search = urlParams.toString();
            }
        }
    </script>
</body>
</html>
